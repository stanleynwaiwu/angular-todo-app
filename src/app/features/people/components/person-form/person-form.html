<div class="p-5 w-full max-w-md">

  <!-- TITLE -->
  <h2 class="text-xl font-semibold text-gray-800 mb-4">
    Add Person
  </h2>

  <form [formGroup]="form" class="space-y-4">

    <!-- NAME -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">
        Name
      </label>

      <input
        type="text"
        formControlName="name"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
        placeholder="Enter full name"
      />

      <div class="mt-1 text-xs text-red-500" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
        <div *ngIf="form.get('name')?.errors?.['required']">
          Name is required
        </div>
        <div *ngIf="form.get('name')?.errors?.['minlength']">
          Must be at least 3 characters
        </div>
        <div *ngIf="form.get('name')?.errors?.['notUnique']">
          Name must be unique
        </div>
      </div>
    </div>

    <!-- EMAIL -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">
        Email
      </label>

      <input
        type="email"
        formControlName="email"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
        placeholder="Enter email address"
      />

      <div class="mt-1 text-xs text-red-500" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        <div *ngIf="form.get('email')?.errors?.['required']">
          Email is required
        </div>
        <div *ngIf="form.get('email')?.errors?.['email']">
          Invalid email format
        </div>
      </div>
    </div>

    <!-- PHONE -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">
        Phone
      </label>

      <input
        type="text"
        formControlName="phone"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
        placeholder="Enter phone number"
      />

      <div class="mt-1 text-xs text-red-500" *ngIf="form.get('phone')?.touched && form.get('phone')?.invalid">
        Phone is required
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="flex justify-end gap-3 pt-3">

      <button
        type="button"
        (click)="cancel()"
        class="px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition"
      >
        Cancel
      </button>

      <button
        type="button"
        (click)="submit()"
        [disabled]="form.invalid"
        class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Save
      </button>

    </div>

  </form>

</div>
