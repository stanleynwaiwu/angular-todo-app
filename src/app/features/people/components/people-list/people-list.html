<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold text-gray-700">
    People Management
  </h2>

  <button
    mat-raised-button
    color="primary"
    class="!bg-blue-600 !text-white !rounded-xl !px-4 !py-2 !text-sm hover:!bg-blue-700 transition"
    (click)="addPerson()"
  >
    + Add Person
  </button>
</div>

<!-- TABLE CONTAINER -->
<div class="overflow-x-auto rounded-xl border border-gray-200">

  <table
    mat-table
    [dataSource]="dataSource"
    class="min-w-full text-sm text-left"
  >

    <!-- NAME -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Name
      </th>
      <td mat-cell *matCellDef="let person" class="!px-4 !py-3 font-medium text-gray-800">
        {{ person.name }}
      </td>
    </ng-container>

    <!-- EMAIL -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Email
      </th>
      <td mat-cell *matCellDef="let person" class="!px-4 !py-3 text-gray-600">
        {{ person.email }}
      </td>
    </ng-container>

    <!-- PHONE -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Phone
      </th>
      <td mat-cell *matCellDef="let person" class="!px-4 !py-3 text-gray-600">
        {{ person.phone }}
      </td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Actions
      </th>

      <td mat-cell *matCellDef="let person" class="!px-4 !py-3">

        <div class="flex gap-2">

          <button
            mat-button
            class="!text-blue-600 hover:!underline text-sm"
            (click)="editPerson(person)"
          >
            Edit
          </button>

          <button
            mat-button
            class="!text-red-500 hover:!underline text-sm"
            (click)="deletePerson(person)"
          >
            Delete
          </button>

        </div>

      </td>
    </ng-container>

    <!-- HEADER -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- ROW -->
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns;"
      class="hover:bg-gray-50 transition"
    ></tr>

  </table>

</div>
