<div class="header">
  <h2>People Management</h2>

  <button mat-raised-button color="primary" (click)="addPerson()">
    + Add Person
  </button>
</div>

<table #table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let person"> {{ person.name }} </td>
  </ng-container>

  <!-- Email Column -->
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> Email </th>
    <td mat-cell *matCellDef="let person"> {{ person.email }} </td>
  </ng-container>

  <!-- Phone Column -->
  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef> Phone </th>
    <td mat-cell *matCellDef="let person"> {{ person.phone }} </td>
  </ng-container>

  <!-- ⭐ ADD THIS: Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>

    <td mat-cell *matCellDef="let person">

      <button mat-button (click)="editPerson(person)">
        Edit
      </button>

      <button mat-button color="warn" (click)="deletePerson(person)">
        Delete
      </button>

    </td>
  </ng-container>

  <!-- Header Row -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <!-- Data Row -->
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
