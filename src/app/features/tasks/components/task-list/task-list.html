<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold text-gray-700">
    Task Management
  </h2>

  <button
    mat-raised-button
    color="primary"
    class="!bg-blue-600 !text-white !rounded-xl !px-4 !py-2 !text-sm hover:!bg-blue-700 transition"
    (click)="addTask()"
  >
    + Add Task
  </button>
</div>

<!-- TABLE CONTAINER -->
<div class="overflow-x-auto rounded-xl border border-gray-200">

  <table
    mat-table
    [dataSource]="dataSource"
    class="min-w-full text-sm text-left"
  >

    <!-- TITLE -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Title
      </th>
      <td mat-cell *matCellDef="let task" class="!px-4 !py-3 font-medium text-gray-800">
        {{ task.title }}
      </td>
    </ng-container>

    <!-- DESCRIPTION ✅ -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Description
      </th>
      <td mat-cell *matCellDef="let task" class="!px-4 !py-3 text-gray-600 max-w-xs truncate">
        {{ task.description || '—' }}
      </td>
    </ng-container>

    <!-- PERSON -->
    <ng-container matColumnDef="person">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Person
      </th>
      <td mat-cell *matCellDef="let task" class="!px-4 !py-3 text-gray-600">
        {{ task.person?.name || 'Unassigned' }}
      </td>
    </ng-container>

    <!-- PRIORITY -->
    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Priority
      </th>
      <td mat-cell *matCellDef="let task" class="!px-4 !py-3">

        <span
          class="px-2 py-1 text-xs rounded-full font-medium"
          [ngClass]="{
            'bg-green-100 text-green-700': task.priority === 'Easy',
            'bg-yellow-100 text-yellow-700': task.priority === 'Medium',
            'bg-red-100 text-red-700': task.priority === 'Hard'
          }"
        >
          {{ task.priority }}
        </span>

      </td>
    </ng-container>

    <!-- STATUS -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Status
      </th>
      <td mat-cell *matCellDef="let task" class="!px-4 !py-3">

        <span
          class="px-2 py-1 text-xs rounded-full font-medium"
          [ngClass]="task.completed
            ? 'bg-blue-100 text-blue-700'
            : 'bg-gray-100 text-gray-600'"
        >
          {{ task.completed ? 'Done' : 'Pending' }}
        </span>

      </td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="!bg-gray-100 !text-gray-600 !font-medium !px-4 !py-3">
        Actions
      </th>

      <td mat-cell *matCellDef="let task" class="!px-4 !py-3">

        <div class="flex gap-2">

          <button
            mat-button
            class="!text-blue-600 hover:!underline text-sm"
            (click)="editTask(task)"
          >
            Edit
          </button>

          <button
            mat-button
            class="!text-red-500 hover:!underline text-sm"
            (click)="deleteTask(task)"
          >
            Delete
          </button>

        </div>

      </td>
    </ng-container>

    <!-- HEADER -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- ROW -->
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns;"
      class="hover:bg-gray-50 transition"
    ></tr>

  </table>

</div>

<!-- PAGINATION ✅ -->
<mat-paginator
  [pageSize]="5"
  [pageSizeOptions]="[5, 10, 20]"
  showFirstLastButtons
  class="mt-4"
>
</mat-paginator>
