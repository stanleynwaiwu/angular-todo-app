

<div class="task-container">

  <div class="header">
    <h2>Task Management</h2>

    <button mat-raised-button color="primary" (click)="addTask()">
      + Add Task
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- TITLE -->
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let task">
        {{ task.title }}
      </td>
    </ng-container>

    <!-- PERSON -->
    <ng-container matColumnDef="person">
      <th mat-header-cell *matHeaderCellDef> Person </th>
      <td mat-cell *matCellDef="let task">
        {{ task.person?.name }}
      </td>
    </ng-container>

    <!-- PRIORITY -->
    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef> Priority </th>
      <td mat-cell *matCellDef="let task">
        <span [ngClass]="task.priority">
          {{ task.priority }}
        </span>
      </td>
    </ng-container>

    <!-- STATUS -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let task">
        <span [ngClass]="task.completed ? 'done' : 'pending'">
          {{ task.completed ? 'Done' : 'Pending' }}
        </span>
      </td>
    </ng-container>

    <!-- ACTIONS -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let task">

        <button mat-button color="primary" (click)="editTask(task)">
          Edit
        </button>

        <button mat-button color="warn" (click)="deleteTask(task)">
          Delete
        </button>

      </td>
    </ng-container>

    <!-- HEADER + ROWS -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
