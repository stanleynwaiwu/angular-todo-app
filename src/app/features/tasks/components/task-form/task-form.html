<div class="p-5 w-full max-w-md">

  <!-- TITLE -->
  <h2 class="text-xl font-semibold text-gray-800 mb-4">
    Add Task
  </h2>

  <form [formGroup]="form" class="space-y-4">

    <!-- TITLE -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="Enter task title" />
    </mat-form-field>

    <!-- DESCRIPTION -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        rows="3"
        formControlName="description"
        placeholder="Describe the task"
      ></textarea>
    </mat-form-field>

    <!-- PRIORITY -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        <mat-option *ngFor="let p of priorities" [value]="p">
          {{ p }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- LABELS -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Labels</mat-label>
      <mat-select formControlName="labels" multiple>
        <mat-option *ngFor="let l of labels" [value]="l">
          {{ l }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- PERSON AUTOCOMPLETE -->
   <mat-form-field appearance="outline" style="width: 100%">
  <mat-label>Select Person</mat-label>

  <input
    matInput
    [matAutocomplete]="auto"
    (input)="filterPeople($event)"
    [value]="form.get('person')?.value?.name"
  />

  <mat-autocomplete #auto="matAutocomplete"
    (optionSelected)="selectPerson($event.option.value)">

    <mat-option *ngFor="let p of filteredPeople" [value]="p">
      {{ p.name }}
    </mat-option>

  </mat-autocomplete>
</mat-form-field>

    <!-- COMPLETED -->
    <div class="flex items-center gap-2">
      <mat-checkbox formControlName="completed">
        Mark as completed
      </mat-checkbox>
    </div>

    <!-- ACTIONS -->
    <div class="flex justify-end gap-3 pt-3">

      <button
        mat-button
        type="button"
        (click)="cancel()"
        class="!px-4 !py-2 !rounded-lg !border !border-gray-300 !text-gray-600 hover:!bg-gray-100 transition"
      >
        Cancel
      </button>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="submit()"
        [disabled]="form.invalid"
        class="!px-4 !py-2 !rounded-lg !bg-blue-600 !text-white hover:!bg-blue-700 transition disabled:!opacity-50"
      >
        Save
      </button>

    </div>

  </form>

</div>
